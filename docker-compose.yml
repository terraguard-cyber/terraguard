services:
  terraguard:
    build: .
    container_name: terraguard
    env_file: .env
    restart: unless-stopped
    networks:
      - tgnet

  nginx:
    image: nginx:1.27-alpine
    container_name: terraguard-nginx
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - terraguard
    restart: unless-stopped
    networks:
      - tgnet

networks:
  tgnet:
    driver: bridge
